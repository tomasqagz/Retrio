name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Rebuild better-sqlite3 for Electron
        run: cd node_modules/better-sqlite3 && npx prebuild-install --runtime=electron --target=34.5.8 --arch=x64
        shell: bash

      - name: Build
        run: npm run build

      - name: Package
        run: npx electron-builder --publish never

      - name: Publish release
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        shell: bash
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          EXE=$(ls dist/app/*.exe | grep -v uninstaller)
          gh release create "$TAG" \
            "$EXE" \
            dist/app/latest.yml \
            --title "$TAG" \
            --notes "Release $TAG"
